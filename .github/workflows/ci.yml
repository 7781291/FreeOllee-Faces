name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest
      - name: Android Lint
        run: ./gradlew :app:lintDebug
      - name: detekt
        run: ./gradlew :app:detekt

  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Accessibility checks + screenshots (emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          script: |
            set +e
            ./gradlew :app:connectedDebugAndroidTest
            code=$?
            mkdir -p docs/screenshots
            # The screenshot test writes PNGs to the instrumented app's external files dir; the
            # exact package (app vs. test) varies, so locate then pull whatever was produced.
            echo "--- locating screenshots on device ---"
            adb shell 'find /sdcard/Android/data -path "*screenshots*.png" 2>/dev/null' || true
            for pkg in com.blizzardcaron.freeolleefaces.debug com.blizzardcaron.freeolleefaces.debug.test; do
              adb pull "/sdcard/Android/data/$pkg/files/screenshots/." docs/screenshots/ || true
            done
            exit $code
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: docs/screenshots/
          if-no-files-found: warn
