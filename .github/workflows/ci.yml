name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest
      - name: Android Lint
        run: ./gradlew :app:lintDebug
      - name: detekt
        run: ./gradlew :app:detekt

  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Accessibility checks + screenshots (emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          # android-emulator-runner runs each script line as a separate `sh -c`, so every command
          # must stand alone. connectedDebugAndroidTest runs first: if it fails (an a11y finding),
          # the runner stops here and the job goes red. On success the run-as pulls below execute;
          # they are best-effort (|| true) so screenshot delivery never reddens a green a11y gate.
          # The screenshot test writes to internal filesDir (scoped storage blocks adb from the
          # external app dir on API 30+); run-as reads it for the debuggable app/test package.
          script: |
            ./gradlew :app:connectedDebugAndroidTest
            mkdir -p docs/screenshots
            adb shell pm list packages | grep -i freeollee || true
            for pkg in $(adb shell pm list packages | sed 's/package://' | grep -i freeollee | tr -d '\r'); do adb exec-out run-as $pkg tar c -C files/screenshots . 2>/dev/null | tar x -C docs/screenshots 2>/dev/null || true; done
            ls -la docs/screenshots || true
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: docs/screenshots/
          if-no-files-found: warn
